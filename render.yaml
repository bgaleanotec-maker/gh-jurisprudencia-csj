services:
  - type: web
    name: gh-jurisprudencia
    env: python
    region: oregon
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /salud
    envVars:
      - key: GEMINI_API_KEY
        sync: false           # se inyecta a mano en el dashboard de Render
      - key: APP_USER
        sync: false           # opcional: usuario para Basic Auth
      - key: APP_PASS
        sync: false           # opcional: contraseña para Basic Auth
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: PIP_NO_CACHE_DIR
        value: "1"
